# Agarvibe Backend Configuration Template
# 复制此文件为 config.yaml 并根据实际环境修改

# ==================== 应用配置 ====================
app:
  name: agarvibe-backend
  env: development  # development/staging/production
  debug: true
  log_level: debug  # debug/info/warn/error
  
  server:
    port: 8080
    read_timeout: 30s
    write_timeout: 30s
    idle_timeout: 60s
  
  cors:
    allowed_origins:
      - http://localhost:3000
      - https://app.agarvibe.com
    allowed_methods:
      - GET
      - POST
      - PUT
      - DELETE
      - OPTIONS
    allowed_headers:
      - Authorization
      - Content-Type
      - X-Request-ID
    max_age: 86400

# ==================== 数据库配置 ====================
database:
  postgresql:
    host: localhost
    port: 5432
    database: agarvibe_dev
    username: postgres
    password: ${DB_PASSWORD}
    ssl_mode: disable  # disable/require/verify-full
    
    pool:
      max_open_conns: 50
      max_idle_conns: 10
      conn_max_lifetime: 1h
      conn_max_idle_time: 5m
  
  mongodb:
    uri: mongodb://localhost:27017
    database: agarvibe_dev
    replica_set: rs0
    
    pool:
      max_pool_size: 100
      min_pool_size: 10
      max_idle_time_ms: 30000

# ==================== Redis 配置 ====================
redis:
  host: localhost
  port: 6379
  password: ${REDIS_PASSWORD}
  db: 0
  
  pool:
    size: 30
    min_idle: 5
    conn_max_idle_time: 5m
    conn_max_lifetime: 30m

# ==================== NATS 消息队列 ====================
nats:
  urls:
    - nats://localhost:4222
  cluster_id: agarvibe-cluster
  client_id: ${HOSTNAME}
  
  reconnect:
    wait: 2s
    max_reconnect: 60
  
  publish:
    timeout: 5s
    async: true

# ==================== JWT 配置 ====================
jwt:
  secret: ${JWT_SECRET}  # 生产环境使用 KMS 管理的密钥
  algorithm: RS256  # HS256/RS256/ES256
  
  access_token:
    ttl: 24h
    issuer: agarvibe-auth
    audience:
      - agarvibe-app
      - agarvibe-admin
  
  refresh_token:
    ttl: 720h  # 30 天
    rotation: true  # 刷新时轮换 Token
  
  clock_skew: 2m  # 时钟漂移容忍

# ==================== AWS 配置 ====================
aws:
  region: us-east-1
  access_key_id: ${AWS_ACCESS_KEY_ID}
  secret_access_key: ${AWS_SECRET_ACCESS_KEY}
  
  s3:
    bucket: agarvibe-dev
    endpoint:  # 留空使用 AWS S3，填写则使用 MinIO 等兼容服务
    use_ssl: true
  
  kms:
    key_id: alias/agarvibe-key
  
  sns:
    topic_arn: arn:aws:sns:us-east-1:123456789012:agarvibe-alerts

# ==================== AI 服务配置 ====================
ai:
  provider: openai  # openai/anthropic/azure/local
  
  openai:
    api_key: ${OPENAI_API_KEY}
    model: gpt-4
    max_tokens: 2000
    temperature: 0.7
    timeout: 30s
  
  anthropic:
    api_key: ${ANTHROPIC_API_KEY}
    model: claude-3-opus-20240229
    max_tokens: 2000
  
  rag:
    enabled: true
    vector_store: chroma  # chroma/pinecone/milvus
    top_k: 5
    similarity_threshold: 0.7

# ==================== 区块链配置 ====================
blockchain:
  bsc:
    chain_id: 56  # 56=BSC Mainnet, 97=BSC Testnet
    rpc_url: https://bsc-dataseed.binance.org
    ws_url: wss://bsc-ws-node.nariox.org:443
    
    # NFT 合约地址 (部署后填写)
    nft_contract: 0x0000000000000000000000000000000000000000
    
    # Gas 配置
    gas_price:
      default: 5000000000  # 5 Gwei
      max: 10000000000     # 10 Gwei
      fast: 8000000000     # 8 Gwei
    
    # 监听配置
    listener:
      block_confirmations: 12
      retry_interval: 10s
      max_retries: 5

# ==================== 支付配置 ====================
payment:
  stripe:
    secret_key: ${STRIPE_SECRET_KEY}
    publishable_key: ${STRIPE_PUBLISHABLE_KEY}
    webhook_secret: ${STRIPE_WEBHOOK_SECRET}
  
  paypal:
    client_id: ${PAYPAL_CLIENT_ID}
    client_secret: ${PAYPAL_CLIENT_SECRET}
    mode: sandbox  # sandbox/live
  
  crypto:
    supported_currencies:
      - BNB
      - BUSD
      - ETH
    
    # 汇率更新间隔 (秒)
    exchange_rate_interval: 60

# ==================== 对象存储配置 ====================
storage:
  provider: s3  # s3/minio/local
  
  s3:
    bucket: agarvibe-media
    region: us-east-1
    acl: private
  
  cdn:
    enabled: true
    domain: https://cdn.agarvibe.com
  
  upload:
    max_file_size: 52428800  # 50MB
    allowed_types:
      - image/jpeg
      - image/png
      - image/gif
      - audio/mp4
      - video/mp4

# ==================== 推送通知配置 ====================
notification:
  firebase:
    project_id: agarvibe
    credentials_file: ./configs/firebase-credentials.json
  
  apns:
    key_id: ${APNS_KEY_ID}
    team_id: ${APNS_TEAM_ID}
    bundle_id: com.agarvibe.app
    key_file: ./configs/AuthKey.p8

# ==================== 监控配置 ====================
monitoring:
  prometheus:
    enabled: true
    path: /metrics
  
  jaeger:
    enabled: true
    agent_host: localhost
    agent_port: 6831
    service_name: ${SERVICE_NAME}
  
  sentry:
    enabled: false
    dsn: ${SENTRY_DSN}
    environment: development
    traces_sample_rate: 0.1

# ==================== 速率限制配置 ====================
rate_limit:
  enabled: true
  backend: redis  # memory/redis
  
  default:
    requests: 100
    window: 1m
  
  rules:
    auth_login:
      requests: 5
      window: 1m
    auth_register:
      requests: 3
      window: 1h
    auth_sms:
      requests: 5
      window: 1h
    ai_chat:
      requests: 20
      window: 1m
    payment_create:
      requests: 10
      window: 1h

# ==================== 安全配置 ====================
security:
  # CORS
  cors_enabled: true
  
  # CSRF
  csrf:
    enabled: true
    secret: ${CSRF_SECRET}
    cookie_name: _csrf
    header_name: X-CSRF-Token
  
  # Helmet (安全头)
  helmet:
    enabled: true
    hsts: true
    hsts_max_age: 31536000
    content_type_nosniff: true
    x_frame_options: DENY
  
  # IP 黑名单
  ip_blocklist:
    enabled: true
    check_interval: 5m

# ==================== 特性开关 ====================
features:
  kyc_enabled: false
  marketplace_enabled: true
  community_enabled: true
  ai_memory_summary: true
  ai_fortune_daily: true
  nft_transfer_enabled: true
  secondary_market: false  # 暂未实现

# ==================== 其他配置 ====================
misc:
  # 默认分页大小
  default_page_size: 20
  max_page_size: 100
  
  # 文件清理定时任务
  cleanup:
    enabled: true
    schedule: "0 3 * * *"  # 每天凌晨 3 点
    temp_file_ttl: 24h
  
  # 数据导出
  export:
    max_records: 10000
    format: json  # json/csv
